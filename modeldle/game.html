<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modeldle - Daily ML Model Guessing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .game-info {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .daily-model-hint {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
        }

        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #667eea;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 10;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .guesses-container {
            margin-top: 20px;
        }

        .guess {
            background: #f9f9f9;
            border-left: 4px solid #ddd;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .guess.correct {
            background: #d4edda;
            border-left-color: #28a745;
        }

        .guess-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.05em;
        }

        .attribute-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }

        .attribute {
            display: flex;
            align-items: center;
            font-size: 0.9em;
        }

        .attribute-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }

        .match {
            background: #28a745;
        }

        .no-match {
            background: #dc3545;
        }

        .attribute-label {
            font-weight: 600;
            color: #333;
            min-width: 130px;
        }

        .attribute-value {
            color: #555;
        }

        .win-message {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 20px;
        }

        .guesses-count {
            font-size: 0.9em;
            color: #666;
            margin-top: 15px;
            text-align: center;
        }

        .info-text {
            font-size: 0.85em;
            color: #999;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .reset-button {
            display: block;
            margin: 20px auto 0;
        }

        .button-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .share-button {
            background: #28a745;
        }

        .share-button:hover {
            background: #218838;
        }

        .attribute.date-comparison .attribute-indicator {
            font-size: 1.2em;
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            background: #f0f0f0;
            padding: 12px 15px;
            border-radius: 8px;
            width: fit-content;
        }

        .toggle-label {
            font-size: 0.95em;
            font-weight: 600;
            color: #333;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #667eea;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Modeldle</h1>
            <p>Guess the daily ML model!</p>
        </header>

        <div class="game-info">
            <div class="daily-model-hint">
                <strong>Today's Model:</strong> <span id="dailyInfo">Loading...</span>
            </div>

            <div class="toggle-container">
                <label class="toggle-label">Easy Mode (Filter Guesses)</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="easyModeToggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    id="modelSearch" 
                    placeholder="Search and select a model..."
                    autocomplete="off"
                >
                <div class="suggestions" id="suggestions"></div>
            </div>

            <div class="info-text">
                🎯 Guess a model and see how many attributes match the daily target!
            </div>

            <div id="guessesContainer" class="guesses-container"></div>

            <div id="winMessage"></div>
            <div class="guesses-count" id="guessesCount"></div>

            <div class="button-row">
                <button class="share-button" id="shareButton" style="display: none;">📋 Share Results</button>
                <button class="reset-button" id="resetButton">🔄 New Game (Reset)</button>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION: Select which attributes to display ==========
        const GAME_ATTRIBUTES = [
            { label: 'Learning Type', key: 'LearningType' },
            { label: 'Tasks', key: 'Tasks' },
            { label: 'Interpretability', key: 'Interpretability' },
            { label: 'Date Introduced', key: 'DateIntroduced' }
        ];
        // ========================================================================

        // Seeded random number generator
        function seededRandom(seed) {
            const x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        // Get today's date as seed
        function getDailySeed() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const dateString = `${year}${month}${day}`;
            return parseInt(dateString);
        }

        let models = [];
        let todayModel = null;
        let guesses = [];
        let hasWon = false;
        let easyMode = false;

        // Parse CSV data
        async function loadModels() {
            try {
                const response = await fetch('models.csv');
                const csv = await response.text();
                const lines = csv.trim().split('\n');
                const headers = lines[0].split(',');

                models = lines.slice(1).map(line => {
                    const values = line.split(',');
                    const model = {};
                    headers.forEach((header, index) => {
                        model[header.trim()] = values[index]?.trim() || '';
                    });
                    return model;
                });

                // Select today's model using date-based seeding
                const seed = getDailySeed();
                const randomIndex = Math.floor(seededRandom(seed) * models.length);
                todayModel = models[randomIndex];

                updateUI();
                loadSavedGame();
            } catch (error) {
                console.error('Error loading models:', error);
                document.querySelector('.loading').textContent = 'Error loading game data';
            }
        }

        function updateUI() {
            document.getElementById('dailyInfo').textContent = 
                `You have ${guesses.length} guess${guesses.length !== 1 ? 'es' : ''} so far`;

            const container = document.getElementById('guessesContainer');
            container.innerHTML = '';

            guesses.forEach(guess => {
                const guessEl = createGuessElement(guess);
                container.appendChild(guessEl);
            });

            // Show/hide share button
            document.getElementById('shareButton').style.display = guesses.length > 0 ? 'block' : 'none';

            if (hasWon) {
                const winDiv = document.getElementById('winMessage');
                winDiv.innerHTML = `
                    <div class="win-message">
                        ✨ You got it! The model was <strong>${todayModel.ModelName}</strong>!
                    </div>
                `;
            }

            document.getElementById('guessesCount').textContent = 
                guesses.length > 0 ? `You've made ${guesses.length} guess${guesses.length !== 1 ? 'es' : ''}` : '';
        }

        function createGuessElement(guessedModel) {
            const div = document.createElement('div');
            div.className = 'guess ' + (guessedModel.ModelName === todayModel.ModelName ? 'correct' : '');

            const title = document.createElement('div');
            title.className = 'guess-title';
            title.textContent = guessedModel.ModelName;
            div.appendChild(title);

            // Display configured attributes
            const attrRow = document.createElement('div');
            attrRow.className = 'attribute-row';

            GAME_ATTRIBUTES.forEach(attr => {
                const attrDiv = document.createElement('div');
                attrDiv.className = 'attribute';

                const guessValue = guessedModel[attr.key];
                const targetValue = todayModel[attr.key];
                const isMatch = guessValue === targetValue;
                const isDateAttr = attr.key === 'DateIntroduced';

                const indicator = document.createElement('div');
                indicator.className = 'attribute-indicator';

                if (isDateAttr && !isMatch) {
                    // Parse dates for comparison
                    const guessDate = parseDate(guessValue);
                    const targetDate = parseDate(targetValue);
                    
                    if (guessDate && targetDate) {
                        if (guessDate < targetDate) {
                            indicator.className += ' no-match';
                            indicator.textContent = '↓'; // Older
                            attrDiv.className += ' date-comparison';
                        } else if (guessDate > targetDate) {
                            indicator.className += ' no-match';
                            indicator.textContent = '↑'; // Newer
                            attrDiv.className += ' date-comparison';
                        }
                    } else {
                        indicator.className += ' no-match';
                        indicator.textContent = '✗';
                    }
                } else {
                    indicator.className += (isMatch ? 'match' : 'no-match');
                    indicator.textContent = isMatch ? '✓' : '✗';
                }

                const label = document.createElement('span');
                label.className = 'attribute-label';
                label.textContent = attr.label + ':';

                const value = document.createElement('span');
                value.className = 'attribute-value';
                value.textContent = guessValue;

                attrDiv.appendChild(indicator);
                attrDiv.appendChild(label);
                attrDiv.appendChild(value);
                attrRow.appendChild(attrDiv);
            });

            div.appendChild(attrRow);
            return div;
        }

        function parseDate(dateStr) {
            // Parse date strings like "2023", "2023-06", "2023-06-15", or "June 2023"
            if (!dateStr) return null;
            
            dateStr = dateStr.trim();
            
            // Try YYYY format
            if (/^\d{4}$/.test(dateStr)) {
                return new Date(parseInt(dateStr), 0, 1);
            }
            
            // Try YYYY-MM format
            if (/^\d{4}-\d{2}$/.test(dateStr)) {
                const [year, month] = dateStr.split('-').map(Number);
                return new Date(year, month - 1, 1);
            }
            
            // Try YYYY-MM-DD format
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
                return new Date(dateStr);
            }
            
            // Try to parse as a date string like "June 2023"
            const parsed = new Date(dateStr);
            if (!isNaN(parsed.getTime())) {
                return parsed;
            }
            
            return null;
        }

        function generateShareText() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            let text = `🤖 Modeldle - ${dateStr}\n`;
            text += `${guesses.length} Guess${guesses.length !== 1 ? 'es' : ''}\n`;
            text += hasWon ? '✨ Solved!\n' : 'In Progress...\n';
            text += '\n';

            guesses.forEach(guess => {
                const isCorrect = guess.ModelName === todayModel.ModelName;
                text += `${guess.ModelName}\n`;

                GAME_ATTRIBUTES.forEach(attr => {
                    const guessValue = guess[attr.key];
                    const targetValue = todayModel[attr.key];
                    const isMatch = guessValue === targetValue;
                    const isDateAttr = attr.key === 'DateIntroduced';

                    let indicator = '';
                    if (isDateAttr && !isMatch) {
                        const guessDate = parseDate(guessValue);
                        const targetDate = parseDate(targetValue);
                        if (guessDate && targetDate) {
                            if (guessDate < targetDate) {
                                indicator = '↓';
                            } else if (guessDate > targetDate) {
                                indicator = '↑';
                            } else {
                                indicator = '✓';
                            }
                        } else {
                            indicator = '✗';
                        }
                    } else {
                        indicator = isMatch ? '✓' : '✗';
                    }

                    text += `  ${indicator}\n`;
                });

                text += '\n';
            });

            text += '🔗 Play at: csthomps.github.io/modeldle/game.html';
            return text;
        }

        document.getElementById('shareButton').addEventListener('click', function() {
            const shareText = generateShareText();
            
            // Copy to clipboard
            navigator.clipboard.writeText(shareText).then(() => {
                // Show feedback
                const feedback = document.createElement('div');
                feedback.className = 'copy-feedback';
                feedback.textContent = '✓ Copied to clipboard!';
                document.body.appendChild(feedback);

                setTimeout(() => {
                    feedback.remove();
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy to clipboard');
            });
        });

        // Search and autocomplete
        const modelSearch = document.getElementById('modelSearch');
        const suggestionsDiv = document.getElementById('suggestions');

        function getSolvedAttributes() {
            // Get attributes that have been correctly matched in previous guesses
            const solved = {};
            
            guesses.forEach(guess => {
                if (guess.ModelName !== todayModel.ModelName) {
                    // Only consider non-winning guesses to find correct matches
                    GAME_ATTRIBUTES.forEach(attr => {
                        if (guess[attr.key] === todayModel[attr.key]) {
                            solved[attr.key] = todayModel[attr.key];
                        }
                    });
                }
            });
            
            return solved;
        }

        function modelMatchesSolvedAttributes(model) {
            // Check if model matches all the solved attributes
            const solved = getSolvedAttributes();
            
            for (const [key, value] of Object.entries(solved)) {
                if (model[key] !== value) {
                    return false;
                }
            }
            
            return true;
        }

        function getFilteredModels(baseModels) {
            if (!easyMode) {
                return baseModels;
            }
            
            return baseModels.filter(m => modelMatchesSolvedAttributes(m));
        }

        modelSearch.addEventListener('focus', function() {
            // Show all models when field is focused
            if (models.length > 0 && this.value.length === 0) {
                showAllSuggestions();
            }
        });

        modelSearch.addEventListener('input', function() {
            const query = this.value.toLowerCase();

            if (query.length === 0) {
                showAllSuggestions();
                return;
            }

            let filtered = models.filter(m => 
                m.ModelName.toLowerCase().includes(query) ||
                m.ShortName.toLowerCase().includes(query)
            );

            filtered = getFilteredModels(filtered).slice(0, 15);

            if (filtered.length === 0) {
                suggestionsDiv.classList.remove('show');
                return;
            }

            suggestionsDiv.innerHTML = filtered.map(m => 
                `<div class="suggestion-item" data-model="${m.ModelName}">${m.ModelName}</div>`
            ).join('');

            suggestionsDiv.classList.add('show');
            attachSuggestionListeners();
        });

        function showAllSuggestions() {
            if (models.length === 0) return;

            let filtered = models.slice();
            filtered = getFilteredModels(filtered).slice(0, 15);

            suggestionsDiv.innerHTML = filtered.map(m => 
                `<div class="suggestion-item" data-model="${m.ModelName}">${m.ModelName}</div>`
            ).join('');

            suggestionsDiv.classList.add('show');
            attachSuggestionListeners();
        }

        function attachSuggestionListeners() {
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', function() {
                    selectModel(this.dataset.model);
                });
            });
        }

        function selectModel(modelName) {
            const model = models.find(m => m.ModelName === modelName);
            if (model && !guesses.find(g => g.ModelName === modelName)) {
                guesses.push(model);
                if (model.ModelName === todayModel.ModelName) {
                    hasWon = true;
                }
                saveGame();
                updateUI();
                document.getElementById('modelSearch').value = '';
                document.getElementById('suggestions').classList.remove('show');
            }
        }

        function saveGame() {
            const gameState = {
                guesses: guesses.map(g => g.ModelName),
                hasWon: hasWon,
                date: new Date().toDateString()
            };
            localStorage.setItem('modeldle-game', JSON.stringify(gameState));
        }

        function loadSavedGame() {
            const saved = localStorage.getItem('modeldle-game');
            if (saved) {
                const gameState = JSON.parse(saved);
                const today = new Date().toDateString();
                
                if (gameState.date === today) {
                    guesses = gameState.guesses.map(name => 
                        models.find(m => m.ModelName === name)
                    ).filter(m => m);
                    hasWon = gameState.hasWon;
                    updateUI();
                } else {
                    // New day, reset
                    resetGame();
                }
            }
        }

        function resetGame() {
            guesses = [];
            hasWon = false;
            saveGame();
            updateUI();
            document.getElementById('modelSearch').value = '';
            document.getElementById('winMessage').innerHTML = '';
        }

        document.getElementById('resetButton').addEventListener('click', resetGame);

        document.getElementById('easyModeToggle').addEventListener('change', function() {
            easyMode = this.checked;
            // Refresh the suggestions with new filtering
            if (modelSearch.value.length === 0 && suggestionsDiv.classList.contains('show')) {
                showAllSuggestions();
            }
        });

        // Load models on page load
        loadModels();

        // Close suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (e.target.id !== 'modelSearch' && !e.target.closest('.search-container')) {
                suggestionsDiv.classList.remove('show');
            }
        });
    </script>
</body>
</html>
